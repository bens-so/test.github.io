  }

  function textOnly(html) {
    return html
      .replace(/<script[\s\S]*?<\/script>/gi, ' ')
      .replace(/<style[\s\S]*?<\/style>/gi, ' ')
      .replace(/<[^>]+>/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function summarize(route, sentences = 3) {
    const text = textOnly(materialize(route));
    const parts = text.match(/[^.!?]+[.!?]?/g) || [text];
    return {
      route,
      summary: parts.slice(0, sentences).join(' ').trim(),
      characters: text.length
    };
  }

  function summarizeAll() {
    return ARCHIVE.meta.posts.map((post) => ({
      route: post.route,
      title: post.title,
      summary: summarize(post.route, 2).summary
    }));
  }

  globalThis.__PACKED_BLOG__ = {
    meta: ARCHIVE.meta,
    routes: Object.keys(ARCHIVE.spans),
    materialize,
    summarize,
    summarizeAll
  };

  const page = materialize('/verify');
  if (typeof document !== 'undefined') {
    document.open();
    document.write(page);
    document.close();
  }
  return page;
})();
</script>
