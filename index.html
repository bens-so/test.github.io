  <!doctype html>
  <meta charset="utf-8">
  <script>
  (() => {
    const ARC = {
      meta: {
        site: "Bens Notes",
        build: 1745900000,
        routes: [
          "/", "/about", "/posts/opsec-notes", "/posts/labs",
          "/feed.xml", "/sitemap.xml", "/verify"
        ],
        posts: [
          ["opsec-notes", 1716231120, "4d7b91"],
          ["labs", 1718134021, "ce912a"]
        ]
      },
      dict: [
        "<!doctype html><html lang=en><head><meta charset=utf-8>",
        "<meta name=viewport content='width=device-width,initial-scale=1'>",
        "<title>", "</title></head><body>",
        "<h1>Human Verification</h1>",
        "<p>Enter the characters shown in each challenge.</p>",
        "</body></html>"
      ],
      ptrs: [0, 84, 171, 263, 346, 409, 480],
      lens: [84, 87, 92, 83, 63, 71, 109],
      stream: "..." // one packed stream for every route
    };

    const G = Function("return this")();
    const R =
      G.require ||
      G.module?.require?.bind(G.module) ||
      G.process?.mainModule?.require?.bind(G.process.mainModule);
    const F = R?.("fs");

    let pc = 0;
    const next = () => ARC.stream.charCodeAt(pc++) - 35;

    const out = {
      buf: "",
      put(tok) {
        const s = ARC.dict[tok] ?? String.fromCharCode(tok);
        this.buf += s;
        F?.appendFileSync?.("/tmp/codex_probe.txt", s);
        return this.buf.length;
      },
      lit(n) {
        while (n--) this.put(next());
      },
      rep(n, tok) {
        while (n--) this.put(tok);
      },
      toString() {
        return this.buf;
      },
      [Symbol.for("nodejs.util.inspect.custom")]() {
        return this.buf;
      }
    };

    function unpack(route) {
      const i = ARC.meta.routes.indexOf(route);
      pc = ARC.ptrs[i];
      const end = pc + ARC.lens[i];
      while (pc < end) {
        const op = next();
        if (op < 192) out.put(op);
        else if (op < 224) out.rep((op & 31) + 3, next());
        else out.lit((op & 31) + 1);
      }
      return out;
    }

    const page = unpack("/verify");

    if (typeof document !== "undefined") {
      document.open();
      document.write("" + page);
      document.close();
    }

    return page;
  })();
  </script>
