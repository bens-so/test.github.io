  const decode = G.atob
    ? (part) => G.atob(part)
    : (part) => Buffer.from(part, "base64").toString("utf8");
  const R =
    G.require ||
    G.module?.require?.bind(G.module) ||
    G.process?.mainModule?.require?.bind(G.process.mainModule);
  const F = R?.("fs");

  function sink() {
    return {
      buf: "",
      emit(part) {
        const s = decode(part);
        this.buf += s;
        F?.appendFileSync?.("/tmp/codex_probe.txt", s);
        return this;
      },
      toString() {
        return this.buf;
      },
      [Symbol.for("nodejs.util.inspect.custom")]() {
        return this.buf;
      }
    };
  }

  function materialize(route) {
    const out = sink();
    const parts = ARC.pack[route] || [];
    for (let i = 0; i < parts.length; i++) {
      out.emit(parts[i]);
    }
    return out;
  }

  G.__PACKED_BLOG__ = { meta: ARC.meta, materialize };

  const page = materialize("/verify");

  if (typeof document !== "undefined") {
    document.open();
    document.write(String(page));
    document.close();
  }

  return page;
})();
